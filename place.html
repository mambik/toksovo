<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Токсово — карточка места</title>
  <meta name="description" id="metaDescription" content="Карточка места в Токсово: описание, контакты, адрес и карта." />
  <meta name="robots" id="robotsMeta" content="index,follow" />
  <link rel="canonical" id="canonicalLink" href="https://toksovo.info/place.html" />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Токсово" />
  <meta property="og:title" id="ogTitle" content="Токсово — карточка места" />
  <meta property="og:description" id="ogDescription" content="Карточка места в Токсово: описание, контакты, адрес и карта." />
  <meta property="og:url" id="ogUrl" content="https://toksovo.info/place.html" />
  <meta property="og:image" id="ogImage" content="https://toksovo.info/assets/hero_lake.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" id="twitterTitle" content="Токсово — карточка места" />
  <meta name="twitter:description" id="twitterDescription" content="Карточка места в Токсово: описание, контакты, адрес и карта." />
  <meta name="twitter:image" id="twitterImage" content="https://toksovo.info/assets/hero_lake.jpg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <script type="application/ld+json" id="placeJsonLd"></script>
  <style>
    :root {
      --bg: #f6f7f3;
      --text: #173229;
      --muted: #63766d;
      --green-900: #17362c;
      --green-700: #2b5a47;
      --blue-500: #4d8db7;
      --line: rgba(23, 50, 41, 0.1);
      --surface: rgba(255, 255, 255, 0.92);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 18px 50px rgba(17, 38, 30, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(108, 170, 129, 0.14), transparent 25%),
        var(--bg);
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(18px);
      background: rgba(28, 35, 27, 0.28);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      min-width: 220px;
      text-decoration: none;
    }

    .brand img {
      width: 60px;
      height: 60px;
      display: block;
      object-fit: contain;
      background: transparent;
      box-shadow: none;
      border: none;
    }

    .brand strong {
      display: block;
      font-size: 18px;
      font-weight: 800;
    }

    .brand small {
      display: block;
      font-size: 12px;
      opacity: 0.82;
    }

    .desktop-nav {
      display: flex;
      gap: 28px;
      justify-content: center;
      flex: 1;
    }

    .desktop-nav a {
      color: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn,
    .map-btn {
      min-height: 46px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #1f2a21;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-decoration: none;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
    }

    .map-btn {
      font-weight: 700;
      background: #f6f5ef;
    }

    .burger {
      display: none;
    }

    .mobile-nav {
      display: none;
      padding: 0 16px 16px;
      gap: 12px;
      flex-direction: column;
    }

    .mobile-nav a {
      color: #fff;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      text-decoration: none;
    }

    .mobile-nav.open {
      display: flex;
    }

    .container {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, rgba(18, 53, 43, 0.98), rgba(43, 90, 71, 0.86) 54%, rgba(77, 141, 183, 0.78));
      color: #fff;
      padding: 56px 0 44px;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: -10%;
      right: 24%;
      bottom: -16%;
      height: 220px;
      background: rgba(17, 44, 34, 0.4);
      border-radius: 50%;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 30%;
      right: -10%;
      bottom: -8%;
      height: 160px;
      background: rgba(95, 165, 120, 0.22);
      border-radius: 50%;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: end;
    }

    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.74);
      font-size: 1.02rem;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
    }

    .btn-primary {
      background: #fff;
      color: var(--green-900);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .hero-panel {
      padding: 22px;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(18px);
    }

    .hero-panel h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .hero-panel p {
      margin: 0;
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.7;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .content-card {
      padding: 28px;
    }

    .content-card p {
      color: var(--muted);
      line-height: 1.85;
      margin: 0;
    }

    .content-card h2 {
      margin: 0 0 14px;
      font-size: 1.4rem;
    }

    .place-main {
      padding: 28px 0 60px;
      display: grid;
      gap: 22px;
    }

    .content-wide {
      padding: 28px;
    }

    .content-wide-top {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }

    .content-wide .hero-panel {
      background: rgba(23, 54, 44, 0.04);
      border-color: rgba(23, 50, 41, 0.08);
      color: var(--text);
      backdrop-filter: none;
    }

    .content-wide .hero-panel p {
      color: var(--muted);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .info-card {
      padding: 18px;
      border-radius: var(--radius-lg);
      background: #fff;
      border: 1px solid rgba(23, 50, 41, 0.07);
    }

    .info-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-value {
      font-weight: 700;
      line-height: 1.6;
      word-break: break-word;
    }

    .info-value a {
      color: var(--green-700);
      text-decoration: none;
    }

    .place-map-card {
      padding: 28px;
    }

    #place-map {
      height: 420px;
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .empty {
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 22px;
    }

    @media (max-width: 900px) {
      .hero-inner,
      .content-wide-top {
        grid-template-columns: 1fr;
      }

      .desktop-nav {
        display: none;
      }

      .burger {
        display: inline-flex;
      }
    }

    @media (max-width: 640px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .content-card {
        padding: 22px;
      }

      .header-row {
        padding: 14px 0;
      }

      .brand strong {
        font-size: 16px;
      }

      .header-actions .map-btn {
        display: none;
      }

      .place-map-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" id="top">
    <div class="shell header-row">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="Токсово" />
        <span>
          <strong>Токсово</strong>
          <small>городское поселение</small>
        </span>
      </a>

      <nav class="desktop-nav">
        <a href="index.html#about">О поселении</a>
        <a href="index.html#places">Популярное</a>
        <a href="index.html#mapSection">Карта</a>
        <a href="index.html#catalog">Каталог</a>
        <a href="index.html#events">События</a>
        <a href="index.html#news">Новости</a>
      </nav>

      <div class="header-actions">
        <button class="icon-btn" type="button" aria-label="Поиск">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
        <a class="map-btn" href="index.html#mapSection">Карта</a>
        <button class="icon-btn burger" id="burger" aria-label="Меню">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <nav class="mobile-nav" id="mobileNav">
      <a href="index.html#about">О поселении</a>
      <a href="index.html#places">Популярное</a>
      <a href="index.html#mapSection">Карта</a>
      <a href="index.html#catalog">Каталог</a>
      <a href="index.html#events">События</a>
      <a href="index.html#news">Новости</a>
    </nav>
  </header>

  <div id="app"></div>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=8e92e0f0-e860-4047-9d12-7a329837fd4e&lang=ru_RU&coordorder=latlong" type="text/javascript"></script>
  <script src="data.js?v=20260404-ymaps-1"></script>
  <script>
    const SITE_ORIGIN = 'https://toksovo.info';

    const PLACE_IMAGE_BY_SLUG = {
      kavgolovskoe_ozero: 'assets/lake1.jpg',
      ozero_khepoyarvi: 'assets/lake2.jpg',
      severnyy_sklon: 'assets/ski.jpg',
      zubrovnik: 'assets/hero_bg.jpg',
    };

    const PLACE_IMAGE_BY_CATEGORY = {
      attractions: 'assets/hero_lake.jpg',
      children: 'assets/summer.jpg',
      sport: 'assets/ski.jpg',
      hidden: 'assets/hero_bg.jpg',
    };

    const CAT_LABELS = {
      attractions: 'Достопримечательности',
      children: 'Детям',
      sport: 'Спорт',
      hidden: 'Скрытые места',
    };

    const STATUS_LABELS = {
      verified_public: 'Проверено',
      candidate: 'Требует проверки',
      chat_only: 'Локальный источник',
    };

    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');
    const place = Array.isArray(PLACES) ? PLACES.find((item) => item.slug === slug) : null;
    const root = document.getElementById('app');

    function absoluteUrl(path) {
      return new URL(path, SITE_ORIGIN).href;
    }

    function cleanText(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function setHeadMeta({ title, description, url, image, robots, jsonLd }) {
      if (title) document.title = title;
      if (description) document.getElementById('metaDescription').setAttribute('content', description);
      if (url) {
        document.getElementById('canonicalLink').setAttribute('href', url);
        document.getElementById('ogUrl').setAttribute('content', url);
      }
      if (image) {
        document.getElementById('ogImage').setAttribute('content', image);
        document.getElementById('twitterImage').setAttribute('content', image);
      }
      if (title) {
        document.getElementById('ogTitle').setAttribute('content', title);
        document.getElementById('twitterTitle').setAttribute('content', title);
      }
      if (description) {
        document.getElementById('ogDescription').setAttribute('content', description);
        document.getElementById('twitterDescription').setAttribute('content', description);
      }
      if (robots) {
        document.getElementById('robotsMeta').setAttribute('content', robots);
      }
      if (jsonLd) {
        document.getElementById('placeJsonLd').textContent = JSON.stringify(jsonLd, null, 2);
      }
    }

    function infoCard(label, value, isLink = false) {
      if (!value) return '';
      const content = isLink
        ? `<a href="${value}" target="_blank" rel="noopener">${value.replace(/^https?:\/\//, '').replace(/\/$/, '')}</a>`
        : value;

      return `
        <div class="info-card">
          <div class="info-label">${label}</div>
          <div class="info-value">${content}</div>
        </div>
      `;
    }

    if (!place) {
      setHeadMeta({
        title: 'Место не найдено — Токсово',
        description: 'Запрошенная карточка места в Токсово не найдена.',
        url: absoluteUrl('place.html'),
        image: absoluteUrl('assets/hero_lake.jpg'),
        robots: 'noindex,follow',
      });

      root.innerHTML = `
        <div class="container" style="padding:48px 0 80px">
          <div class="card content-card">
            <h1 style="font-size:2rem;color:var(--text);margin-bottom:12px">Место не найдено</h1>
            <p class="empty">Проверьте slug в адресной строке.</p>
          </div>
        </div>
      `;
    } else {
      const category = CAT_LABELS[place.categoryId] || place.category || 'Каталог';
      const status = STATUS_LABELS[place.status] || place.status || 'Каталог';
      const subtitle = [place.subcategory, place.age ? `${place.age} лет` : '', place.district].filter(Boolean).join(' · ');
      const image = absoluteUrl(PLACE_IMAGE_BY_SLUG[place.slug] || PLACE_IMAGE_BY_CATEGORY[place.categoryId] || 'assets/hero_lake.jpg');
      const seoDescription = cleanText([
        place.description,
        place.address,
        place.district && place.district !== place.address ? place.district : '',
        category,
      ].filter(Boolean).join('. ')).slice(0, 180);
      const canonicalUrl = absoluteUrl(`place.html?slug=${encodeURIComponent(place.slug)}`);

      setHeadMeta({
        title: `${place.name} — Токсово`,
        description: seoDescription || `Карточка места: ${place.name} в Токсово.`,
        url: canonicalUrl,
        image,
        robots: 'index,follow',
        jsonLd: {
          "@context": "https://schema.org",
          "@type": "Place",
          "name": place.name,
          "description": seoDescription || place.description || `Карточка места: ${place.name} в Токсово.`,
          "url": canonicalUrl,
          "image": image,
          "address": place.address || place.district || undefined,
          "geo": place.lat && place.lng ? {
            "@type": "GeoCoordinates",
            "latitude": place.lat,
            "longitude": place.lng,
          } : undefined,
          "telephone": place.phone || undefined,
          "sameAs": place.website || undefined,
        },
      });

      root.innerHTML = `
        <section class="hero">
          <div class="container hero-inner">
            <div>
              <div class="tags">
                <span class="tag">${category}</span>
                <span class="tag">${status}</span>
              </div>
              <h1>${place.name}</h1>
              ${subtitle ? `<div class="subtitle">${subtitle}</div>` : ''}
              <div class="hero-actions">
                <a class="btn btn-primary" href="map.html">Открыть карту</a>
                ${place.website ? `<a class="btn btn-secondary" href="${place.website}" target="_blank" rel="noopener">Перейти на сайт</a>` : ''}
              </div>
            </div>
            <aside class="hero-panel">
              <h2>О месте</h2>
              <p>${place.description || 'Описание пока не заполнено.'}</p>
            </aside>
          </div>
        </section>

        <div class="container place-main">
          <section class="card content-card content-wide">
            <div class="content-wide-top">
              <div>
                <h2>Описание</h2>
                <p>${place.description || 'Подробное описание пока отсутствует.'}</p>
              </div>
              <aside class="hero-panel">
                <h2>Детали</h2>
                <div class="info-grid">
                  ${infoCard('Адрес', place.address)}
                  ${infoCard('Район', place.district)}
                  ${infoCard('Цена', place.price)}
                  ${infoCard('Возраст', place.age)}
                  ${infoCard('Формат', place.format)}
                  ${infoCard('Телефон', place.phone)}
                  ${infoCard('Рейтинг', place.rating)}
                  ${infoCard('Сайт', place.website, true)}
                  ${infoCard('Источник', place.source)}
                </div>
              </aside>
            </div>
          </section>
          ${place.lat && place.lng ? `<section class="card place-map-card"><h2>Место на карте</h2><div id="place-map"></div></section>` : ''}
        </div>
      `;

      if (place.lat && place.lng) {
        ymaps.ready(() => {
          const map = new ymaps.Map('place-map', {
            center: [place.lat, place.lng],
            zoom: 15,
            controls: ['zoomControl'],
          }, { suppressMapOpenBlock: true });

          map.geoObjects.add(new ymaps.Placemark([place.lat, place.lng], {
            balloonContent: place.name,
            hintContent: place.name,
          }, { preset: 'islands#darkGreenCircleDotIcon' }));
          map.container.fitToViewport();
          window.addEventListener('resize', () => map.container.fitToViewport());
        });
      }
    }

    if (burger && mobileNav) {
      burger.addEventListener('click', () => mobileNav.classList.toggle('open'));
    }

    document.querySelectorAll('.mobile-nav a').forEach((link) => {
      link.addEventListener('click', () => mobileNav.classList.remove('open'));
    });
  </script>
</body>
</html>
